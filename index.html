<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('site_theme');
          if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
          } else {
            // Default is light (or whatever you prefer)
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Plataforma digital interactiva para conectar al candidato municipal con los vecinos. Reporta reclamos, sube denuncias anónimas y vota en encuestas municipales para mejorar nuestra comunidad." />
    <meta property="og:title" content="Buzón Ciudadano - Tu Voz en el Municipio" />
    <meta property="og:description" content="Portal interactivo de reclamos vecinales y gestión municipal." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/social-preview.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Buzón Ciudadano - Tu Voz en el Municipio" />
    <meta name="twitter:description" content="Portal interactivo de reclamos vecinales y gestión municipal." />
    <meta name="theme-color" content="#161022" />
    <meta name="facebook-domain-verification" content="qx7ow55bi3uwf1ylhwcen18s6t5unt" />
    
    <title>Buzón Ciudadano - Tu Voz en el Municipio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  </head>
  <body>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #161022;
        z-index: 99999;
        font-family: sans-serif;
        transition: opacity 0.5s ease-out;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        animation: pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulseGlow {
        0%, 100% {
          opacity: 1;
          filter: drop-shadow(0 0 15px rgba(217, 167, 61, 0.6));
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          filter: drop-shadow(0 0 5px rgba(217, 167, 61, 0.2));
          transform: scale(0.95);
        }
      }
    </style>
    <div id="initial-loader">
      <img src="/favicon.png" alt="Cargando Buzón Ciudadano..." class="loader-logo" style="width: 150px; height: 150px; object-fit: contain;" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
